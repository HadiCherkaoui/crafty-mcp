stages:
  - test
  - build
  - publish

# ── Unit tests (fast, no Docker) ──────────────────────────────────
test-unit:
  stage: test
  image: node:20
  script:
    - npm ci
    - npm test
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    expire_in: 1 week
  only:
    - main
    - merge_requests
    - tags

# ── Integration tests (Docker-in-Docker) ──────────────────────────
test-integration:
  stage: test
  image: docker:28.0.4
  services:
    - name: docker:28.0.4-dind
      alias: docker
      command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
  before_script:
    - apk add --no-cache nodejs npm
    - npm ci
  script:
    - npm run test:integration
  after_script:
    - docker compose -f tests/docker-compose.test.yml down -v 2>/dev/null || true
  artifacts:
    when: on_failure
    paths:
      - tests/docker/logs/
    expire_in: 3 days
  only:
    - main
    - merge_requests
    - tags
  allow_failure: false

# ── Build (TypeScript compile) ─────────────────────────────────────
build:
  stage: build
  image: node:20
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - main
    - tags
    - merge_requests

# ── Publish to npm on tag ──────────────────────────────────────────
publish:
  stage: publish
  image: node:20
  only:
    - tags
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm ci
    - npm run build
    - npm publish --access public
  environment:
    name: npm
